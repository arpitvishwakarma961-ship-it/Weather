<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Card</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --text: #e8eefc;
        --muted: rgba(232, 238, 252, 0.7);
        --accent: #66a3ff;
        --danger: #ff6b6b;
        --border: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 600px at 50% 0%, rgba(102, 163, 255, 0.25), transparent),
          var(--bg);
        color: var(--text);
        padding: 24px;
      }

      .app {
        width: min(520px, 100%);
      }

      .searchRow {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      input[type="text"] {
        flex: 1;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
      }

      input[type="text"]::placeholder {
        color: var(--muted);
      }

      input[type="text"]:focus {
        border-color: rgba(102, 163, 255, 0.65);
        box-shadow: 0 0 0 4px rgba(102, 163, 255, 0.14);
      }

      button {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(102, 163, 255, 0.5);
        background: rgba(102, 163, 255, 0.18);
        color: var(--text);
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        padding: 18px;
      }

      .forecast {
        margin-top: 14px;
      }

      .sectionTitle {
        margin: 0 0 10px;
        font-size: 14px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .forecastGrid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      @media (max-width: 520px) {
        .forecastGrid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .forecastItem {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.04);
      }

      .forecastDay {
        font-weight: 800;
        font-size: 13px;
        margin-bottom: 6px;
      }

      .forecastTemp {
        font-weight: 900;
        font-size: 18px;
        line-height: 1.2;
      }

      .forecastCond {
        color: var(--muted);
        font-size: 12px;
        text-transform: capitalize;
        margin-top: 2px;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 10px;
      }

      .city {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 8px;
        letter-spacing: 0.2px;
      }

      .tempRow {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .temp {
        font-size: 44px;
        font-weight: 900;
        line-height: 1;
      }

      .condition {
        font-size: 16px;
        color: var(--muted);
        text-transform: capitalize;
        text-align: right;
        margin-top: 4px;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
        font-weight: 600;
      }

      .srOnly {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <form id="searchForm" class="searchRow" autocomplete="off">
        <label class="srOnly" for="cityInput">City name</label>
        <input
          id="cityInput"
          type="text"
          placeholder="Enter city name (e.g., London)"
          required
        />
        <button id="searchBtn" type="submit">Search</button>
      </form>

      <section class="card" aria-live="polite">
        <div class="meta" id="metaText">Type a city and click Search.</div>
        <h2 class="city" id="cityName">-</h2>

        <div class="tempRow">
          <div class="temp" id="tempValue">--</div>
          <div class="condition" id="conditionText">--</div>
        </div>

        <div id="statusText" class="status"></div>
      </section>

      <section class="card forecast" aria-live="polite">
        <h3 class="sectionTitle">5-day forecast</h3>
        <div id="forecastStatus" class="status">Search for a city to see the forecast.</div>
        <div id="forecastGrid" class="forecastGrid" hidden></div>
      </section>
    </div>

    <script>
      // NOTE: API keys in frontend code are visible to anyone who can view the page.
      // For real projects, use a backend proxy or environment variables.
      const API_KEY = "af0f145ebdcebeff918b09bf6e18befd";
      const UNITS = "metric"; // change to "imperial" if you want Fahrenheit

      const searchForm = document.getElementById("searchForm");
      const cityInput = document.getElementById("cityInput");
      const searchBtn = document.getElementById("searchBtn");

      const metaText = document.getElementById("metaText");
      const cityName = document.getElementById("cityName");
      const tempValue = document.getElementById("tempValue");
      const conditionText = document.getElementById("conditionText");
      const statusText = document.getElementById("statusText");
      const forecastStatus = document.getElementById("forecastStatus");
      const forecastGrid = document.getElementById("forecastGrid");

      function unitSuffix() {
        return UNITS === "imperial" ? "°F" : "°C";
      }

      function setLoading(isLoading) {
        searchBtn.disabled = isLoading;
        searchBtn.textContent = isLoading ? "Searching..." : "Search";
        statusText.textContent = isLoading ? "Fetching weather..." : "";
        statusText.classList.remove("error");
        metaText.textContent = isLoading ? "Please wait..." : "Type a city and click Search.";
      }

      function showError(message) {
        statusText.textContent = message;
        statusText.classList.add("error");
        metaText.textContent = "Could not fetch weather.";
      }

      async function fetchWeather(city) {
        const q = encodeURIComponent(city);
        const url =
          "https://api.openweathermap.org/data/2.5/weather?q=" +
          q +
          "&appid=" +
          API_KEY +
          "&units=" +
          encodeURIComponent(UNITS);

        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const apiMsg =
            (data && (data.message || data.error)) || "Request failed. Check the city name and try again.";
          throw new Error(apiMsg);
        }

        const name = data.name || city;
        const temp = typeof data.main?.temp === "number" ? data.main.temp : null;
        const condition = data.weather?.[0]?.description || "Unknown";

        return { name, temp, condition };
      }

      async function fetchForecast(city) {
        const q = encodeURIComponent(city);
        const url =
          "https://api.openweathermap.org/data/2.5/forecast?q=" +
          q +
          "&appid=" +
          API_KEY +
          "&units=" +
          encodeURIComponent(UNITS);

        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const apiMsg =
            (data && (data.message || data.error)) || "Forecast request failed. Try again.";
          throw new Error(apiMsg);
        }

        return data;
      }

      function formatDayLabel(date) {
        return date.toLocaleDateString(undefined, { weekday: "short" });
      }

      function pick5DaySummaries(forecastJson) {
        const tzSeconds = typeof forecastJson?.city?.timezone === "number" ? forecastJson.city.timezone : 0;
        const list = Array.isArray(forecastJson?.list) ? forecastJson.list : [];

        // Group by local date (in the city's timezone), then pick the entry closest to 12:00.
        const byDate = new Map(); // key: YYYY-MM-DD, value: array of {dt, localDate, hour, temp, cond}

        for (const item of list) {
          if (!item || typeof item.dt !== "number") continue;
          const localMs = (item.dt + tzSeconds) * 1000;
          const d = new Date(localMs);
          const y = d.getUTCFullYear();
          const m = String(d.getUTCMonth() + 1).padStart(2, "0");
          const day = String(d.getUTCDate()).padStart(2, "0");
          const key = `${y}-${m}-${day}`;

          const hour = d.getUTCHours();
          const temp = typeof item.main?.temp === "number" ? item.main.temp : null;
          const cond = item.weather?.[0]?.description || "Unknown";

          const arr = byDate.get(key) || [];
          arr.push({ dt: item.dt, localMs, hour, temp, cond });
          byDate.set(key, arr);
        }

        const keys = Array.from(byDate.keys()).sort();
        const todayKey = keys[0]; // forecast list starts near "now", so first date is "today"
        const futureKeys = keys.filter((k) => k !== todayKey).slice(0, 5);

        const out = [];
        for (const key of futureKeys) {
          const arr = byDate.get(key) || [];
          if (!arr.length) continue;

          // Closest to 12:00 local time, fallback to first.
          let best = arr[0];
          let bestScore = Math.abs((arr[0].hour ?? 0) - 12);
          for (const x of arr) {
            const score = Math.abs((x.hour ?? 0) - 12);
            if (score < bestScore) {
              best = x;
              bestScore = score;
            }
          }

          out.push({
            key,
            label: formatDayLabel(new Date(best.localMs)),
            temp: best.temp,
            cond: best.cond,
          });
        }

        return out;
      }

      function setForecastLoading(isLoading) {
        forecastGrid.hidden = true;
        forecastStatus.textContent = isLoading ? "Fetching 5-day forecast..." : "";
        forecastStatus.classList.remove("error");
      }

      function setForecastError(message) {
        forecastGrid.hidden = true;
        forecastStatus.textContent = message;
        forecastStatus.classList.add("error");
      }

      function renderForecast(items) {
        forecastGrid.innerHTML = "";

        if (!items || items.length === 0) {
          forecastGrid.hidden = true;
          forecastStatus.textContent = "No forecast data available.";
          return;
        }

        const suffix = unitSuffix();
        for (const item of items) {
          const el = document.createElement("div");
          el.className = "forecastItem";

          const tempText = item.temp === null ? "--" : `${Math.round(item.temp)}${suffix}`;

          el.innerHTML =
            `<div class="forecastDay">${item.label}</div>` +
            `<div class="forecastTemp">${tempText}</div>` +
            `<div class="forecastCond">${item.cond}</div>`;

          forecastGrid.appendChild(el);
        }

        forecastStatus.textContent = "";
        forecastGrid.hidden = false;
      }

      searchForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const city = cityInput.value.trim();
        if (!city) {
          showError("Please enter a city name.");
          return;
        }

        setLoading(true);
        setForecastLoading(true);
        try {
          const [result, forecastJson] = await Promise.all([fetchWeather(city), fetchForecast(city)]);

          cityName.textContent = result.name;
          tempValue.textContent =
            result.temp === null ? "--" : `${Math.round(result.temp)}${unitSuffix()}`;
          conditionText.textContent = result.condition;
          metaText.textContent = "Weather result:";
          statusText.textContent = "";
          statusText.classList.remove("error");

          const forecastItems = pick5DaySummaries(forecastJson);
          renderForecast(forecastItems);
        } catch (err) {
          cityName.textContent = "-";
          tempValue.textContent = "--";
          conditionText.textContent = "--";
          showError(err && err.message ? err.message : "Something went wrong.");
          setForecastError(err && err.message ? err.message : "Could not fetch forecast.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
