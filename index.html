<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Card</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --text: #e8eefc;
        --muted: rgba(232, 238, 252, 0.7);
        --accent: #66a3ff;
        --danger: #ff6b6b;
        --border: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 600px at 50% 0%, rgba(102, 163, 255, 0.25), transparent),
          var(--bg);
        color: var(--text);
        padding: 24px;
      }

      .app {
        width: min(520px, 100%);
      }

      .searchRow {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      input[type="text"] {
        flex: 1;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
      }

      input[type="text"]::placeholder {
        color: var(--muted);
      }

      input[type="text"]:focus {
        border-color: rgba(102, 163, 255, 0.65);
        box-shadow: 0 0 0 4px rgba(102, 163, 255, 0.14);
      }

      button {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(102, 163, 255, 0.5);
        background: rgba(102, 163, 255, 0.18);
        color: var(--text);
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        padding: 18px;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 10px;
      }

      .city {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 8px;
        letter-spacing: 0.2px;
      }

      .tempRow {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .temp {
        font-size: 44px;
        font-weight: 900;
        line-height: 1;
      }

      .condition {
        font-size: 16px;
        color: var(--muted);
        text-transform: capitalize;
        text-align: right;
        margin-top: 4px;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
        font-weight: 600;
      }

      .srOnly {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <form id="searchForm" class="searchRow" autocomplete="off">
        <label class="srOnly" for="cityInput">City name</label>
        <input
          id="cityInput"
          type="text"
          placeholder="Enter city name (e.g., London)"
          required
        />
        <button id="searchBtn" type="submit">Search</button>
      </form>

      <section class="card" aria-live="polite">
        <div class="meta" id="metaText">Type a city and click Search.</div>
        <h2 class="city" id="cityName">-</h2>

        <div class="tempRow">
          <div class="temp" id="tempValue">--</div>
          <div class="condition" id="conditionText">--</div>
        </div>

        <div id="statusText" class="status"></div>
      </section>
    </div>

    <script>
      // NOTE: API keys in frontend code are visible to anyone who can view the page.
      // For real projects, use a backend proxy or environment variables.
      const API_KEY = "af0f145ebdcebeff918b09bf6e18befd";
      const UNITS = "metric"; // change to "imperial" if you want Fahrenheit

      const searchForm = document.getElementById("searchForm");
      const cityInput = document.getElementById("cityInput");
      const searchBtn = document.getElementById("searchBtn");

      const metaText = document.getElementById("metaText");
      const cityName = document.getElementById("cityName");
      const tempValue = document.getElementById("tempValue");
      const conditionText = document.getElementById("conditionText");
      const statusText = document.getElementById("statusText");

      function setLoading(isLoading) {
        searchBtn.disabled = isLoading;
        searchBtn.textContent = isLoading ? "Searching..." : "Search";
        statusText.textContent = isLoading ? "Fetching weather..." : "";
        statusText.classList.remove("error");
        metaText.textContent = isLoading ? "Please wait..." : "Type a city and click Search.";
      }

      function showError(message) {
        statusText.textContent = message;
        statusText.classList.add("error");
        metaText.textContent = "Could not fetch weather.";
      }

      async function fetchWeather(city) {
        const q = encodeURIComponent(city);
        const url =
          "https://api.openweathermap.org/data/2.5/weather?q=" +
          q +
          "&appid=" +
          API_KEY +
          "&units=" +
          encodeURIComponent(UNITS);

        const res = await fetch(url);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          const apiMsg =
            (data && (data.message || data.error)) || "Request failed. Check the city name and try again.";
          throw new Error(apiMsg);
        }

        const name = data.name || city;
        const temp = typeof data.main?.temp === "number" ? data.main.temp : null;
        const condition = data.weather?.[0]?.description || "Unknown";

        return { name, temp, condition };
      }

      searchForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const city = cityInput.value.trim();
        if (!city) {
          showError("Please enter a city name.");
          return;
        }

        setLoading(true);
        try {
          const result = await fetchWeather(city);
          cityName.textContent = result.name;
          tempValue.textContent = result.temp === null ? "--" : `${Math.round(result.temp)}°C`;
          conditionText.textContent = result.condition;
          metaText.textContent = "Weather result:";
          statusText.textContent = "";
          statusText.classList.remove("error");
        } catch (err) {
          cityName.textContent = "-";
          tempValue.textContent = "--";
          conditionText.textContent = "--";
          showError(err && err.message ? err.message : "Something went wrong.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
